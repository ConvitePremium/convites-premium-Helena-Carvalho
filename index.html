<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6c1cd">
  <title>Convite Helena Carvalho</title>

  <meta property="og:type" content="website">
  <meta property="og:title" content="Convite Helena Carvalho">
  <meta property="og:description" content="Clique para abrir o convite">
  <meta property="og:url" content="https://convitepremium.github.io/convites-premium-Helena-Carvalho/">
  <meta property="og:image" content="https://convitepremium.github.io/convites-premium-Helena-Carvalho/assets/preview-whatsapp.jpg">
  <meta property="og:image:secure_url" content="https://convitepremium.github.io/convites-premium-Helena-Carvalho/assets/preview-whatsapp.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Convite Helena Carvalho">
  <meta name="twitter:description" content="Clique para abrir o convite">
  <meta name="twitter:image" content="https://convitepremium.github.io/convites-premium-Helena-Carvalho/assets/preview-whatsapp.jpg">

  <link rel="preload" href="assets/opening.webp" as="image">
  <link rel="preload" href="assets/video.mp4" as="video" type="video/mp4">
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
    .screen{position:fixed;inset:0;display:none;background:#000;align-items:center;justify-content:center;overflow:hidden}
    .screen.active{display:flex}
    .art{width:100%;height:100%;object-fit:cover;display:block;user-select:none;-webkit-user-drag:none}
    #opening{cursor:pointer}
    #videoPlayer{width:100%;height:100%;object-fit:cover;background:#000}
    .hotspot{position:absolute;border:0;background:transparent;cursor:pointer;z-index:5}
    .back{position:absolute;top:calc(env(safe-area-inset-top) + 14px);left:14px;z-index:10;border:0;border-radius:999px;padding:10px 14px;background:rgba(255,255,255,.76);color:#6b3a21;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.22)}
    body.debug .hotspot{background:rgba(255,0,0,.22);outline:2px solid rgba(255,0,0,.65)}
    .loading{position:absolute;bottom:28px;left:0;right:0;text-align:center;color:#fff;text-shadow:0 2px 8px #000;font-size:14px;opacity:.85}
  </style>
</head>
<body>
  <main>
    <section id="opening" class="screen active" aria-label="Abrir convite">
      <img class="art" src="assets/opening.webp" alt="Clique para abrir o convite" width="720" height="1280">
      <div class="loading">Toque na tela para abrir</div>
    </section>

    <section id="videoScreen" class="screen" aria-label="Vídeo do convite">
      <video id="videoPlayer" src="assets/video.mp4" preload="metadata" playsinline webkit-playsinline></video>
    </section>

    <section id="mainScreen" class="screen" aria-label="Convite principal">
      <img class="art" src="assets/principal.webp" alt="Convite Helena Carvalho" loading="eager" width="720" height="1280">
      <button class="hotspot" id="confirmBtn" aria-label="Confirmar presença" style="left:20%;top:67%;width:19%;height:11%"></button>
      <button class="hotspot" id="mapBtn" aria-label="Abrir localização" style="left:41%;top:67%;width:18%;height:11%"></button>
      <button class="hotspot" id="giftBtn" aria-label="Ver sugestões de presentes" style="left:61%;top:67%;width:21%;height:11%"></button>
    </section>

    <section id="giftScreen" class="screen" aria-label="Sugestões de presentes">
      <img class="art" src="assets/presentes.webp" alt="Sugestões de presentes" loading="lazy" width="720" height="1280">
      <button class="back" id="backBtn">Voltar</button>
    </section>
  </main>

  <audio id="music" src="assets/musica.mp3" preload="auto" loop></audio>

  <script>
    const WHATSAPP = '5521970054320';
    const MAPS = 'https://www.google.com/maps/@-22.7411985,-43.4468781,3a,75y,26.88h,90t/data=!3m7!1e1!3m5!1sZ79AvjSGWrHFnnQymhQRRA!2e0!6shttps:%2F%2Fstreetviewpixels-pa.googleapis.com%2Fv1%2Fthumbnail%3Fcb_client%3Dmaps_sv.tactile%26w%3D900%26h%3D600%26pitch%3D0%26panoid%3DZ79AvjSGWrHFnnQymhQRRA%26yaw%3D26.88!7i16384!8i8192?entry=ttu&g_ep=EgoyMDI2MDYyOS4wIKXMDSoASAFQAw%3D%3D';
    const MESSAGE = 'Olá! Confirmo minha presença no aniversário da Helena Carvalho.';

    const $ = (id)=>document.getElementById(id);
    const screens = ['opening','videoScreen','mainScreen','giftScreen'].map($);
    const video = $('videoPlayer');
    const music = $('music');

    if (new URLSearchParams(location.search).has('debug')) document.body.classList.add('debug');

    function show(id){
      screens.forEach(s=>s.classList.remove('active'));
      $(id).classList.add('active');
    }

    function startMusic(){
      music.volume = 0;
      const playPromise = music.play();
      if (playPromise && playPromise.catch) playPromise.catch(()=>{});
      let v = 0;
      const fade = setInterval(()=>{
        v = Math.min(0.30, v + 0.03);
        music.volume = v;
        if (v >= 0.30) clearInterval(fade);
      }, 120);
    }

    $('opening').addEventListener('click', async ()=>{
      show('videoScreen');
      startMusic();
      video.volume = 1;
      try { await video.play(); } catch(e) { show('mainScreen'); }
    }, {once:true});

    video.addEventListener('ended', ()=> show('mainScreen'));
    video.addEventListener('error', ()=> show('mainScreen'));

    $('confirmBtn').addEventListener('click', ()=>{
      window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(MESSAGE)}`, '_blank');
    });
    $('mapBtn').addEventListener('click', ()=> window.open(MAPS, '_blank'));
    $('giftBtn').addEventListener('click', ()=> show('giftScreen'));
    $('backBtn').addEventListener('click', ()=> show('mainScreen'));
  </script>
</body>
</html>
